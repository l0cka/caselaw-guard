name: Package

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install build tooling
        run: python -m pip install --upgrade pip build twine

      - name: Build package
        run: python -m build

      - name: Check package metadata
        run: python -m twine check dist/*

      - name: Smoke test built wheel
        run: |
          WHEEL=$(python - <<'PY'
          from pathlib import Path

          print(next(Path("dist").glob("caselaw_guard-*.whl")))
          PY
          )
          python -m venv /tmp/caselaw-guard-wheel
          /tmp/caselaw-guard-wheel/bin/python -m pip install --upgrade pip
          /tmp/caselaw-guard-wheel/bin/python -m pip install "${WHEEL}[mcp]"
          /tmp/caselaw-guard-wheel/bin/caselaw-guard --help
          /tmp/caselaw-guard-wheel/bin/python - <<'PY'
          import sys
          from pathlib import Path
          from importlib.metadata import entry_points

          scripts = {entry_point.name for entry_point in entry_points(group="console_scripts")}
          assert "caselaw-guard" in scripts
          assert "caselaw-guard-mcp" in scripts
          bin_dir = Path(sys.executable).parent
          assert (bin_dir / "caselaw-guard").exists()
          assert (bin_dir / "caselaw-guard-mcp").exists()

          from caselaw_guard.mcp_server import create_mcp_server

          server = create_mcp_server()
          assert type(server).__name__ == "FastMCP"
          PY
